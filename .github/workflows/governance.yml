name: Governance Check

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  plan-freshness:
    name: PLAN.md Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check PLAN.md freshness
        run: |
          OUTPUT=$(python governance_tools/plan_freshness.py --format json) || true
          echo "$OUTPUT" | python3 -c "
          import json, sys
          result = json.load(sys.stdin)
          status = result['status']
          days = result.get('days_since_update')
          limit = result.get('threshold_days', '?')
          print(f'PLAN.md status: {status} ({days}d since last update, threshold: {limit}d)')
          if status in {'CRITICAL', 'ERROR'}:
              print('::error file=PLAN.md::PLAN.md freshness gate failed.')
              sys.exit(1)
          if status == 'STALE':
              print(f'::warning file=PLAN.md::PLAN.md is STALE ({days}d).')
          "

  governance-unit-tests:
    name: Governance Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run governance tests
        run: pytest tests/test_memory_janitor.py tests/test_contract_validator.py tests/test_plan_freshness.py -p no:cacheprovider

  phase-gates:
    name: Phase Gate Verification
    runs-on: ubuntu-latest
    needs: [plan-freshness, governance-unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Verify phase gates
        run: python scripts/verify_phase_gates.py

      - name: Generate failure context on gate failure
        if: failure()
        run: |
          python governance_tools/generate_failure_context.py --skip-contract --output FAILURE_CONTEXT.md

      - name: Upload failure context
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-context
          path: FAILURE_CONTEXT.md

  memory-pressure:
    name: Memory Pressure
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check memory pressure
        run: |
          if [ ! -d "memory" ]; then
            echo "memory/ not found; skipping pressure check"
            exit 0
          fi
          OUTPUT=$(python governance_tools/memory_janitor.py --memory-root ./memory --check --format json) || true
          echo "$OUTPUT" | python3 -c "
          import json, sys
          result = json.load(sys.stdin)
          status = result['status']
          lines = result['line_count']
          hard = result.get('hard_limit', 200)
          print(f'Memory status: {status} ({lines}/{hard} lines)')
          if status == 'EMERGENCY':
              print('::error::Memory EMERGENCY; run governance_tools/memory_janitor.py --plan and --execute.')
              sys.exit(1)
          if status == 'CRITICAL':
              print(f'::warning::Memory CRITICAL ({lines} lines). Run memory_janitor soon.')
          elif status == 'WARNING':
              print(f'::notice::Memory WARNING ({lines} lines).')
          "

  generated-artifact-pressure:
    name: Generated Artifact Pressure
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check generated caches
        run: |
          OUTPUT=$(python governance_tools/memory_janitor.py --memory-root ./memory --clean-generated --dry-run --format json)
          echo "$OUTPUT" | python3 -c "
          import json, sys
          result = json.load(sys.stdin)
          skipped = result.get('skipped_paths', [])
          print(f'Generated artifacts detected: {len(skipped)}')
          for path in skipped:
              print(f'::notice::{path}')
          "
